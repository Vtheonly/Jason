version: '3.8'

services:
  jason-web:
    build:
      context: ./node_service
      dockerfile: Dockerfile
    container_name: jason-web-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PYTHON_SERVICE_HOST=jason-core
      - PYTHON_SERVICE_PORT=50051
      - NODE_ENV=production
      - LOG_LEVEL=info
    volumes:
      - jason-shared-temp:/tmp/jason_workspace
    networks:
      - jason-network
    depends_on:
      - jason-core
    restart: unless-stopped

  jason-core:
    build:
      context: ./python_service
      dockerfile: Dockerfile
    container_name: jason-python-core
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - LOG_LEVEL=INFO
    volumes:
      - jason-shared-temp:/tmp/jason_workspace
    networks:
      - jason-network
    restart: unless-stopped

volumes:
  jason-shared-temp:
    driver: local

networks:
  jason-network:
    driver: bridge