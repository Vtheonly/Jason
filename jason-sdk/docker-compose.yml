version: '3.8'

services:
  jason-web:
    build:
      context: .
      dockerfile: node_service/Dockerfile
    container_name: jason-web-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - LOG_LEVEL=info
      - PYTHON_SERVICE_HOST=jason-core
      - PYTHON_SERVICE_PORT=50051
      - JASON_WORKSPACE=/tmp/jason_workspace
    volumes:
      - jason-shared-temp:/tmp/jason_workspace
    networks:
      - jason-network
    depends_on:
      - jason-core
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  jason-core:
    build:
      context: .
      dockerfile: python_service/Dockerfile
    container_name: jason-python-core
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - LOG_LEVEL=INFO
    volumes:
      - jason-shared-temp:/tmp/jason_workspace
    networks:
      - jason-network
    restart: unless-stopped

volumes:
  jason-shared-temp:
    driver: local

networks:
  jason-network:
    driver: bridge
